services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: pe_dev
      POSTGRES_USER: pe
      POSTGRES_PASSWORD: pe_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pe -d pe_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  hapi:
    image: hapiproject/hapi:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: "3000"
    volumes:
      - hapi_data:/data/hapi
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/fhir/metadata || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── Application Services ───────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://pe:pe_password@postgres:5432/pe_dev
      REDIS_URL: redis://redis:6379
      HAPI_FHIR_URL: http://hapi:8080/fhir
      PROXY_SERVICE_URL: http://proxy:3002
      VALIDATOR_SERVICE_URL: http://validator:3010
      PA_SIMULATOR_SERVICE_URL: http://pa-simulator:3003
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hapi:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://pe:pe_password@postgres:5432/pe_dev
      REDIS_URL: redis://redis:6379
      HAPI_FHIR_URL: http://hapi:8080/fhir
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hapi:
        condition: service_healthy
    volumes:
      - ./apps/proxy/src:/app/apps/proxy/src
      - ./packages:/app/packages

  validator:
    build:
      context: .
      dockerfile: apps/validator/Dockerfile
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: development
      PORT: 3010
      DATABASE_URL: postgresql://pe:pe_password@postgres:5432/pe_dev
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/validator/src:/app/apps/validator/src
      - ./packages:/app/packages
      - validator_cache:/app/apps/validator/cache

  pa-simulator:
    build:
      context: .
      dockerfile: apps/pa-simulator/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://pe:pe_password@postgres:5432/pe_dev
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/pa-simulator/src:/app/apps/pa-simulator/src
      - ./packages:/app/packages

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      - api
    volumes:
      - ./apps/dashboard/src:/app/apps/dashboard/src

volumes:
  postgres_data:
  redis_data:
  hapi_data:
  validator_cache:
