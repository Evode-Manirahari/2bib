apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: pe
  labels:
    app: proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: proxy
          image: ghcr.io/your-org/pe/proxy:latest
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: pe-config
            - secretRef:
                name: pe-secrets
          env:
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: pe
  labels:
    app: proxy
spec:
  selector:
    app: proxy
  ports:
    - name: http
      port: 3002
      targetPort: 3002
