apiVersion: apps/v1
kind: Deployment
metadata:
  name: validator
  namespace: pe
  labels:
    app: validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: validator
  template:
    metadata:
      labels:
        app: validator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: validator
          image: ghcr.io/your-org/pe/validator:latest
          ports:
            - containerPort: 3010
              name: http
          envFrom:
            - configMapRef:
                name: pe-config
            - secretRef:
                name: pe-secrets
          env:
            - name: PORT
              value: "3010"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: hl7-cache
              mountPath: /app/apps/validator/cache
      volumes:
        - name: hl7-cache
          persistentVolumeClaim:
            claimName: validator-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: validator
  namespace: pe
  labels:
    app: validator
spec:
  selector:
    app: validator
  ports:
    - name: http
      port: 3010
      targetPort: 3010
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: validator-cache-pvc
  namespace: pe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
