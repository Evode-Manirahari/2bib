[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Pushes Prisma schema to the database before the service starts
releaseCommand = "node /app/node_modules/.bin/prisma db push --schema /app/packages/db/prisma/schema.prisma --skip-generate --accept-data-loss"
